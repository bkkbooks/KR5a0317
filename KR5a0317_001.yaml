front:
  text: 純陽帝君神化妙通紀卷之一
  hash: sha256:550434bfbc1ac33db78355d238dcd033ff89da03406e2d7f275fd91ca14825f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_001-001a, image: hfl/0159/0159-012.png}
body:
  text: 玄門苗善時校正編次詩彖瑞應明本第一化謹按道統録帝君姓吕名巖宇洞賔唐河中府永樂縣人氏曾祖延之終浙東節度使祖渭性賦純良文詞精妙樂善好道多有陰德纍遷禮部侍郎終潭州刺史贈陜州大都督渭生四子溫恭儉讓溫治春秋藻翰精富一時遷户部員外郎終衡州刺史恭尚氣節喜縱橫終殿中侍御史儉多才進御史裏行讓有德善政遷太子右庶子終海州刺史真人乃讓季子唐德宗貞元十四年四月十四日已時衆見有一白鶴自天飛下竟入房帳中不見母氏正寢亦夢驚覺即時真人降生異香滿室經日不散童稚時敦重少語不好戲長大身長六尺有餘道骨仙風鳳目入鬢眉秀鼻聳面色黃白左眉角右眼下各一痣如豆大兩足下龜紋隱起性稟純厚仁孝聰敏三教經書圓貫精熟常誦周易道德陰符經喜頂華陽巾衣黃白襴衫大絛或逍遙服冠帶後不肯姻娶常慕清虛恬淡不好華飾富榮自幼年已有仙道志矣彖章曰夫大道人人本具物物全彰奈人自有生以來物欲交攻利名迷昧況自己無福緣祖宗無善德所以棄道遠矣故仙師云達道登真必仗祖宗陰德厚實自己夙生靈慧剛志果決可以省力成證豈虛言哉本紀帝君天性純厚仁孝聰敏三教經書一覽圓貫豈非夙生靈慧果乎祖陜州都督樂善好道政多陰德生四子皆顯達乃父讓純厚仁善政有佳聲百姓敬慕故上知名遷太子官屬以此誠實遂感真仙謫降豈非善積餘慶乎帝君自冠以來不肯婚娶寶貴精神豈非身體髮膚不敢毁傷乎篤志修真心澄性朗養浩樂天名揚後世豈非全德要道以顯父母乎況繼嗣玄元道統名襲紫府仙宗為天人聖師神化無方隱顯莫測豈可以常賢聖共語哉或疑各本載帝君生所及居處不一詳推乃父仕宦遷移又作者欲在本鄉人物為美是以差誤不一今考河中府永樂鎮九峯山故宅基址儼然今建純陽萬壽宫是矣永樂縣至宋熙寧間改作鎮愚校正的實亦不敢固執庶幾同志無疑矣黃粱夢覺第二化唐憲宗元和五年時年二十一歲赴長安應舉寄居旅館一日有一羽士狀貌奇古美髯環目鶴氅長裙豐采不凡直詣館中揖坐話間誘化帝君入道帝君曰待某受一官爵光顯祖上門風然後隨師未晚羽士笑求一齋帝君命僕造飯覺身倦欲睡羽士於袖中取一枕與帝君曰此如意枕若枕此從爾平日所好即應就枕卧方睡忽一使者至召狀元吕某受誥始自州縣官次擢朝署由是臺諫翰苑祕閣及諸清要無不備歷或黜或升前後兩娶富貴家女子孫振振簪笏盈門如此幾四十年最後獨相十年權勢薰炙忽被重罪籍沒家産分散妻孥流于嶺表孑然窮弱憔悴立馬風雪中方此嗟歎恍然夢覺羽士在旁笑曰黃粱猶未熟一夢到華胥帝君驚曰君知我夢耶羽士曰子適來一夢萬態榮悴多端五十年間一俄頃耳得不足喜喪不足憂且有大覺而後知此大夢人間世百年亦一大夢耳帝君豁然悟曰縱簪纓極品金玉滿堂以此椎之亦造物戲弄何足戀哉遂作禮再拜曰先生非凡也願加點化愚蒙羽士曰汝既頓徹幻化空花利名桎梏回心向道易矣帝君曰某然少省如易中云遊魂為變死生之説盡性至命之理望師慈憫指示修進之方羽士默然良久曰萬理融通則心朗徹七情寧息則性圓明此心澄息自然本性玉虛又何遊魂為變性一太空寂明寥廓了無生滅何死生之慮哉乃知我本無生何名為死帝君茫然良久大洞明了再拜謝曰夙生慶幸得遇仙真適聞慈音妙義恍然不知有我羽士曰吾所語汝乃性盡之妙一邊事也以至慧命末後大事待汝果脫灑時再付未晚帝君謝曰師孰耳羽士曰吾鍾離其姓權名也雲房其宇也吾居終南七星山鶴嶺子異日尋吾來言畢飄然而往帝君曰悵然亦自樂次日回本鄉彖章曰南華老仙因蝴蝶夢頓然大覺純陽帝君因黃粱夢了徹本元故南華經云且有大覺然後知此其大夢也純陽帝君頓然徹悟萬幻皆空一真洞曉旨哉美哉慈濟陰德第三化帝君回鄉中時遇飢荒罄拾資産糧米救濟飢貧得活者幾三二萬人鄉中耆老親屬亦喜亦勸存留資産為子孫計帝君歎曰夫人之失也自心昏迷本性以致貪戀幻物慳吝錢財而生嗔怒憎愛沉淪苦趣某非敢抑諸親因少有省不足戀也如是作一詩以示鄉宿親屬云碎葫蘆踏碎琴飄然拂袖出儒林太初實相純如玉元始真如瑩若金丹焰沖天神莫測劍鋒入地鬼難尋自從一覺黃粱後始信從前枉用心後别鄉里倬然往終南山尋師皆莫能留彖章曰帝君别親時遇飢荒盡捨資産糧米救濟飢貧得活者三二萬人鄉中耆老親屬喜敬亦勸存留資産為子孫計真人歎曰夫人之失也自心昏迷本性以致貪戀幻物慳吝錢財生嗔怒煩惱沉淪苦趣某非敢抑鄉尊因徹悟夢幻我身尚假財物何足戀也遂作此詩辭别入道奇哉愚詳此詩因留注為同志受用碎葫蘆踏碎琴粉碎幻化形骸冰消音聲色相飄然拂袖出儒林拂開名利綱超出是非叢太初實相純如玉清淨法身圓明堅固元始真如瑩若金亘古亘今真常不壤丹焰沖天人莫測靈光洞燭神化無方劔峰入地鬼難尋智慧深藏妖魔怎見自從一覺黃粱夢夢覺俱空真靈不昧始信從前枉用心十載文章畫餅三場事業空花可憐人我之徒將此詩除四句改一覺為一見黃粱為黃龍似此問答不一以帝君飛劍斬黃龍蠢哉如帝君詩云粟中藏世界芥子納須彌鐺內煮山川即六祖劫火燒海底此皆喻真空慧命之妙如般若梵語言智慧豈可假土地口鼓葛藤枝謊乎以此誑惑愚俗是何心哉亦如熾盛佛降九曜且夫九曜星辰自天以來經躔度數毫分無差且木星紫氣在人命中主人富貴聰明仁慈純善何罪而佛降之若果降了則至今星辰不躔度亦無造化矣謬妄之甚佛心高眀則笑其誑妄也誣上天星辰毁中國仙聖此輩歷歷惡報都沒結果奈何迷昧不復傷哉故真人神化記云吾之慧劍斬三尸六賊貪嗔愛欲煩惱障豈肯取人頭況超禪師與吾何仇故朱文公云君子仁慈猶克已神仙安肯取人頭信哉吾教西化經所載三十餘段事實故宋仁宗贊云東訓尼父西化金仙又韓真人度慧禪師入道為馮尊師真人紫陽真人度道光禪師入道為紫腎真人又吕祖師度有德僧十餘人皆實事傳吾教並不彰耀誇矜因此人我之徒巧撰遮掩其先生亦有參和尚者呵呵純陽帝君神化妙通紀卷之一
