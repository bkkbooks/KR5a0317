front:
  text: 純陽帝君神化妙通紀卷之二帝二
  hash: sha256:1eb5d488af8f6db090ee99596188dacde4014d3ec97138c12ce8c8128ed4212f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_002-001a, image: hfl/0159/0159-026.png}
body:
  text: 玄門苗善時校正編次詩彖歷試五魔第四化帝君將别鄕忽見家人皆病死帝君心无悼怛但備葬具忽病死者皆起无恙此一試也一夜忽劫盜數十各持刀杖勒逼財物少頃家中財寳捲盡而去帝君並不動聲色任其所取此二試也次别鄕里三兩程迷路抵暮遥見燈明遂往見草房兩間一老者携取魚網出帝君向前揖投宿老者曰我孑然一身乘夜取魚推托再三遂開門言秀才自歇我去取魚令帝君閉門霎時忽一女子年二十許叫門帝君將謂老者親屬開門此女携一袱入門作禮云秀才妾夜晚迷路投一宿帝君答此非我家我亦在此與漁翁借歇我亦不敢留娘子宿女子云彼此客中一宿即去何必阻妾夜深黑暗妾亦去不得百端妖媚調戲又云妾家田產財物無數妾見携金寳若干妾願與秀才爲妻有何不可亦不辜負秀才帝君默坐並不動心任女子百端至曉忽開眼在一大樹下坐默自笑而起行此三試也次至一渡春潦水溢得一小舟來遂求渡上小舟將至中流黑風大浪雷電大雨俱至浪濤翻滚小舟翻側飄蕩帝君瞑目㝠坐任生任死心若泰山將近岸小舟覆沉幸得上岸人問何故帝君笑而不答此四試也次夜至一旅舍約三更忽見奇形怪狀无數鬼神有欲打者有欲殺者帝君巍坐一切不問須臾有數夜叉押一囚血肉淋淋號叫仗劍來前曰汝宿世殺我今日見汝可速還我命帝君曰殺命宜也又何說焉引頸就殺忽聞空中叱喝神鬼即散不見有一人撫掌笑曰吾雲房也吾嘗歎仙才難得人之塵心難滅吾之求人向道甚於人欲求我也故五試汝子皆不動心然可以教子但功行未完今且授汝鍊黄白祕方可以濟物利人待汝功行滿吾來度子帝君曰得燒鍊口訣復問如此則鍊成將乆有變異乎雲房曰三千年後還本質帝君愀然曰如此則必誤三千年後人也某不願爲也雲房曰子心如此三千八百功行成悉在此矣彖章曰夫人之厚貌深情此心最難測度故南華經云十事試之以得人周易繫辭以四等言辭而見人之情偽况學道修仙入大聖人乎豈輕易矣故聖經云多易必多難聖人猶難之況我輩乎今觀我輩逆境則怒順境則喜塵心俗氣舊識熟境舉止常在禀賦血氣之性未解習俗之性未改分毫而大言闊說誇誕張皇揚眉竪目舉拂拈槌舒拳竪指敲喝叫唤熱亂狂放百端情態而云本然天性一徹頓超正所謂抱臟叫屈掩耳偷鈴徒自欺昩深可憐哉正陽帝君以惡魔順境歷試不一純陽帝君心一玉虚凝然不可動揺再以黃白之術云立功行亦不願爲宜乎正陽帝君樂然撫掌而接引矣我輩輕心慢意小德小智而爲自了徹聞此歷試不動胡不寒心神變傳經第五化正陽師眞曰吾所居終南鶴嶺洞天子能從我遊乎純陽帝君曰願侍鸞儀師自携眞人手偕行纔數步而恍然雲飄風送經歷山川頃刻至鶴嶺洞前有二虎師叱之去俄門開有天丁侍衛見琪樹珍葩祥雲瑞靄中朱户金釘玉臺寳殿瑶階金閣二仙童迎師入瓊堂正坐帝君侍坐和氣如春景物非凡少頃仙童十數持元和瓊漿仙果貢獻飲畢閑坐間帝君避席問曰此何洞天師曰此吾師東華帝君舊館少陽洞天帝君再拜問曰修仙有幾種何功得至此師曰修眞有一十五品仙人略言一二如明悟世間生滅不常幻妄俱空塵心頓息本性圓明此名清靈鬼仙法天地昇降之理效陰陽消息之微假身心爲鼎爐以精炁爲藥物五藴皆空七情泯息乆乆色身輕健法象飄然此名靈明地仙情慾皆泯愛識頓消此心明了一性虛無以太極爲爐天地爲鼎鍊元精息元氣凝元神三元混妙一眞體玄恍惚象先超然未始鬼神莫測變化无方此名神仙神炁妙融變化莫測混然无狀性命玉虛體一太空眞空不空大象无象逍遥无極游泳先天頓超虛无自然玉清眞境此名天仙帝君問曰此總謂大道乎師曰大道无形无名无問無應其大无外其小无内充塞宇宙運化古今不變不遷无生无死不化而化不神而神希夷微妙清虛自然不可致詰子其勉之忽有二仙人金冠霞氅玉佩雲裳捧玉詔金書召九天金闕選仙使鍾離某赴蓬萊上宮瑶池仙會師迎詔眞人遂獻一詩得道來來相見難又聞東去上仙壇杖頭春色一壺酒頂上雲攢五岳冠飲海龜兒人不識燒山符子鬼難看先生去後身須老乞與貧兒换骨丹此詩恐師去急不回也師笑於袖中出靈寳昇玄消灾䕶命經一卷付眞人再囑曰此經乃師東華帝君授受中言眞空重玄之妙剖劈有无色聲妄幻子當熟味吾不乆回珍重珍重彖章曰谷神不昩曰靈元炁融中曰寳徹入玄關登上境曰昇玄心息混融保合太和曰護命經中自衆生沉滯聲色迷惑有无至若知空不空知色不色名爲照了始達妙音識无空法洞觀无礙入衆妙門自然解悟離諸疑網不著空見已上言辭簡當性理雙融盡三教性理眞空大藏關要悉備於此經奈此輩日誦爲常更不參玩眞味徒爲多端見解誠可傷哉師眞始指鬼仙地仙神仙法度後授此經豈不有意外之妙乎學仙志士誠心咀玩可矣明玄體道第六化正陽眞師赴會旬月餘回至洞天帝君喜迎再拜師曰子在於此岑寂數日得无欲歸乎帝君曰某塵縁既斷俗炁已消既心志道更奚有家山之思乎師點首安慰帝君問曰魂魄冥冥至理幽深何以全眞師曰慧燈冥冥泰定神靈神旣混合豈不契眞金形玉質本出精神法象飛昇就付口訣云云帝君再拜謝時洞中金光明耀清炁雍和帝君九拜長跪曰某嘗玩諸仙丹經卦象異名多有疑心望師慈憫愚蒙一一細詳開發師曰心本无迹疑從何有且天地未肇父母未生道之一宇亦是强名何卦象異名之有子既有疑不妨拈出帝君曰丹書言修金丹何謂金丹師曰金堅之喻丹圓之喻即爾本性圓明堅固是也問曰性命一乎二乎師曰不可謂之一亦不可謂之二一點靈明无昧性也一點元氣常調命也性无命則无依倚亦不能安止命無性則不冲融亦不能固密二物混融一眞玉瑩性也命也俱强名爾問曰何謂水火答曰元神火也元炁水也神炁混融則水火旣濟也問曰何謂眞陰眞陽答曰身中一點元精眞陰也一點元炁眞陽也精炁密融則陰陽混合而爲純一之體也問曰何謂坎離答曰即前陰陽水火之象也陰中陽坎也陽中陰離也取坎中一陽復離中一陰則成純陽乾體也問曰何謂一陽生答曰身中元炁元炁生發時也靜極一動便是一陽生也所以道時至神知至此時也淵清息念含光内燭自然三宮升降道德經云綿綿若存用之不勤以致純全皆自然而然泥於子午四正本生時皆妄爲也所以不知常妄作凶也問曰何謂火候答曰慧火炁候也心息相依綿綿温固文火候也情生念動剛志力反武火候也問曰何謂藥物答曰元炁元精也問曰何謂爐鼎答曰身爲玉爐心爲金鼎也問曰何謂玄關答曰至玄至妙之樞機也又謂玄之又玄最上重關也元神凝中强名神谷元炁息中强名玄牝假喻身中玄竅虚无之谷也元无定所不有不空道德經云谷神不死是謂玄牝即此妙也問曰何謂青龍白虎答曰性屬木故喻青龍情屬金故喻白虎金能剋木故情多損性誠能攝情歸性則金木无間而爲一自然龍虎伏矣問曰何謂龜蛇即前水火陰陽之象也問曰何謂鉛汞答曰心與炁也心猶汞之難死誠能息炁養心則心死而性圓明虛心養浩則炁息而命无漏矣鉛能制汞故聖人假此二物爲喻教人易爲修眞至於八卦五行皆假喻以歸元四象三才悉强名而達道汝能死心息炁息炁凝神炁神一混心性一源身外有身體一玉虛這許多評論都是太空雲翳鏡水塵風汝其頓徹力行自然而然眞人拜謝彖章曰師祖此篇問答歷代聖師心心密印祕授仁德志士戒勿輕示常人愚夙生慶幸得遇心傳時默敬味焚香九禮假空感謝言言金書玉字寳珠乃修眞最妙的的上義心明性養之玄微慧命眞空之妙用盡在是矣愚味此嘗默歎世傳靈寳畢法鍾吕傳道集謬妄之甚乃要名尚奇之士爲之或云施肩吾作亦未知是否又有於偽書中取用作集作記證事證理而爲傳道根源眞乃井蛙耳認賊作兒捐石爲土以盲指盲無廉恥之甚矣愚亦不敢多言自有别寳者在焉密印劍法第七化正陽師眞宴坐間而謂純陽帝君曰修眞體道全憑慧力堅持入妙造玄先要志剛决烈所以極終極始天地莫遷大用大機鬼神莫測故聖人携寳劍倒斡璇璣仗剛鋒直摧魔怪故有劍法之喻也此劍也採无極至精合先天元炁假乾坤之爐鞲運元始之鉗鎚慧火煅成靈泉磨利以太極爲環剛中爲柄美利爲刃清淨爲匣虚白燦爛純粹堅剛運造化之機秉仁威之令舉之无今古按之無先後六天神鬼歸降三界妖魔乞命破煩惱障絶貪愛縁斬七情誅六賊斷嗔怒勦妄邪事物來前迎刃而解藏之身可以无生死體象先撝之政可以鎮國家清天下光輝善利圓混剛中奸邪一見寒心外道纔聞破膽子當精進圓成橫向太虛凛凛帝君受此劍法至敬禮謝韜光晦迹密降華峰强名曰先天遁神劍教門善時得此劍篇咀玩不勝眞樂遂作慧劍吟紫極洞中傳劍訣不屬陰陽不用鐵先天元炁煅鎔冲鑄成便會誅妖孽得煅鍊經琢磨利勝鏌鋣及大阿握在手中龍虎伏收歸匣内炁神和斬三尸誅五賊勦滅七情并六慾貪嗔愛鬼悉消亡昏散魔軍皆滅没亦能生亦能殺生殺威權流電星事物來前迎刃解憂疑瞥起逐鋒平吾吕祖仙得此劍開闢乾坤成一片死生絶斷體金堅隱顯无方時變現救死漢活骼髏神仙安肯取人頭野孤巧撰瞞愚鄙丹鳳何嘗怪黑鶖伏天魔降外道萬法千門一劈掃威鎮太平没價珍德清宇宙无窮寳此寳劍常隨身藏諸用顯諸仁絶如美玉无瑕璺瑩似水晶絶點塵此寳劍无中有太上親授東華手諸祖列仙密密傳得之慧妙光星斗掣金電按玉龍出入縱横現六通雪刃光輝无極内霜鋩明燦太虚中平天下齊家國等閑一舉世清肅忠良賢聖盡歸依奸佞逆邪皆剪戮諸佛祖衆仙眞若无此劍道難成剖除人慾全天理掃蕩風雲昇太清純陽帝君神化妙通紀卷之二
