front:
  text: 純陽帝君神化妙通紀卷之六帝六
  hash: sha256:c6efac97be91d341423380b9037dbac26b568add120aa47a71cd2a06f42ac4f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_006-001a, image: hfl/0159/0159-136.png}
body:
  text: 玄門苗善時校正編次詩彖度劉高尚第八十一化劉高尚天資純厚性賦溫良不喜貴榮頓拋富産捐情割愛泯識超凡不事王侯高尚其志棄儒從道遁跡林泉逍遙方外先遇一仙人謂曰辟內錠鉸碎甕復完喻修真亦如此後遇帝君語契遂問曰道心惟微可得見乎答曰非耳目所及惟精神默會問允執厥中何謂中答七情未發處六欲不生時是甚麼又問云何體式帝君默然端視於空中畫一宇高尚拜云萬理歸元一性太虛弟子已無疑矣帝君曰慧命真空子知之乎高尚再拜請教帝君密授口訣而往後於渤海縣安定鎮築室居園二十餘年修證圓成道化大行徽宗三詔方至闕庭惟以清靜自然無為輔化之㫖奏之上問修鍊金丹之妙答曰陛下萬機此方外事不勞聖問上默然喜敬敕賜微妙處士號後遊羅浮山建立道場又於秀州隱真道院顯化皆有碑記作還元篇于世常教門人曰神凝氣聚氣息丹成心無妄念意不外馳死心搨地不必外求三處神化詩彖碎甕錠鉸喻漏可修微中頓悟七情元由無疑性了慧命未周得師密授快樂天游中原圜隱遊戲羅浮秀州堂內副墨同儔百千億妙道化皇州三詔諫帝清淨嘉猷功成行滿一劍瀛洲宫中勦崇第八十二化政和中宫禁有崇白晝現形盜金寶姦妃嬪獨有上所居無患自林靈素王文卿諸侍宸等治之息而復作上精齊虔禱奏詞九天晝寢見東門外有一道士碧蓮冠紫鶴氅手執水晶如意前揖上曰臣奉上帝敕來治崇良久一金甲丈夫捉崇劈而啖之且盡上問丈夫何人道士曰乃陛下所封崇寧真君關羽也上勉勞之再四復問張飛何在羽曰飛乃臣纍劫弟兄今已為陛下生于相州嶽家他日輔佐中興飛將有功焉上問師何姓名曰姓陽四月十四日生陛下性尚奇怪多心不正致使邪犯宫庭當正心清靜治化天下免將來奸盜侵亂帝不省遂隱去意其為洞賔也自是宫禁帖然遂詔天下有洞賔香火處皆正妙道神化之號仍塑像于景靈宫歲時奉祠焉詩彖天子天元氣純誠貴執中誠中不欺昧上下悉和通奸佞潛蹤迹陰邪絶影踪忠良全正化妖怪沒神通清靜陰陽泰和平人物豐兵戈咸偃息天下樂仁風遊戲羅浮第八十三化帝君遊羅浮朱明觀至小院中值道士他出獨一小童在院童揖帝君先生少坐此遂竊道士酒以獻帝君滿飲使童子盡其餘童子不飲童所患左目內障帝君以所餘酒噀其目忽開明若素無患者乃取筆畫一山水于壁山下作池三口謂飮吾酒則得仙矣不飲命也然亦高壽言訖飛入石壁隱去及道士歸見所畫山透壁內外大驚曰山下三口乃崑字非吕先生乎後童果百五歲而終詩彖信步恍然遊海嶽翻身忽爾到羅浮豁開道眼除昏暗山水隱名歸太虛長沙警僧第八十四化帝君遊長沙托為回道人持小瓦罐乞錢得錢無算而錢常不滿人皆神之一日坐巿道上言能以錢滿吾罐者當授以道人爭以錢投罐不滿有僧椎車錢戲曰汝能容之否道人曰唯乃令推車入罐嚘嚘然有聲俄不見僧曰神仙耶幻術耶道人口占詩曰非神亦非仙非術亦非幻天地有終窮桑田幾遷變身固非汝身則亦何足戀曷不從吾游騎鯨騰汗漫僧益驚疑欲死之道人曰若惜此錢耶吾今償若取片紙投罐祝曰速推車出良久不出道人曰非我自取不可因跳入罐寂然僧擊碎罐上有片紙題一詩曰尋真要識真見真渾未悟一笑再相逢驅車東平路僧悵然歸次東平忽見道人曰吾俟若缺錢之念己償求道如此不可也僧方悔謝已遂不及矣詩彖萬法總非真一身皆是幻功名似水泡世事猶雲變金玉豈常存簪纓非久戀凡僧尚愛財苦海增瀰漫幻物迷且貪真宗昧不悟不知明性天只會用心路警婁道明第八十五化梓潼婁道明家富而善素女術常蓄少女選十分美麗豐肥無瘢痕者常不減十人之數然好周急濟貧多有陰騭神清體健面若桃花或經月不食年九十七止如五十許人尤好誇誕大言對客會飲或言素女送果或言彭祖容成輩遺書自以為真神仙也一日帝君詭為乞人登門婁不識之叱使去帝君以兩足於甎石上遽成兩方竅深可三寸婁始異之延置座右曰子非乞人也出侍女歌游仙歌命之酒帝君口占望江南詞酬之曰瑶池上瑞霧藹群仙素練金童鏘鳳版青衣女子嘯鸞笙身在大羅天沉醉處縹眇玉京山唱徹步虛清燕罷不知今夕是何年海水又桑田侍女進蜀箋請書自紙尾倒書徹紙首足不遺空隙婁大驚喜請問道要曰吾以口口相傳矣婁請益復曰吾以口口相傳矣俄登門外大柏樹杪不見後數日婁忽不快吐膏液如銀者數斗而卒口口相傳之說與夫石上兩方竅皆吕字之寓也詞彖婁公秉氣壯實賦性慈仁惜乎心術不正如言送酒送果遺書皆著邪魔境然多有陰德故祖師警救之哀哉道明不明清高士志道體真仙養浩虛中吹玉笛凝神真樂吸瓊笙清淨瑩心天離欲海放倒我人山玄素採陰魔畜道婁公邪術執為玄休效損丹田青城鶴會第八十六化紹興末帝君赴青城山鶴會憩一賣餅家人亦不識醉吐餿麵盆中主人不動心但聞吐盆異香滿室人頗異之洞賔濃墨大書詩一章于門之大木上曰但患去針心真銅水换金鬢邊無白髮駛馬去難尋後題吕洞賔來四宇筆勢遒徑光彩殊常觀者雲集或取刀削之已深透木背墨跡轉鮮時士人關雲祥者見之即會其像乃一清癯道人也是後其家油餅大會詩彖青城鶴會度金針吐出肝腸遍地金肉眼凡夫何不悟曰雲飄杳莫能尋度曹三香第八十七化安豐縣娼曹三香染惡疾為邸舍往來客帝君詭為寒士托宿僕以其藍縷拒之三香曰吾既立此門尸垢淨何擇焉遂延入殊禮待之居無何曹疾作神吟良苦帝君以筯針其股曰回心回心時門外一皂角樹久槁死帝君投以藥翌日樹即再生枝葉蕃茂曹始悟真為神仙而兩回心者吕也即毁眼去粉黛棄家遠遊仍為呂真人祠奉祀焉紹興未曹忽還鄉顔狀秀異人無識者奈自言本末復去不知所終詩彖人人皆可證為仙才肯回心便有緣為感三香善陰德淤泥一舉上青天寶輪現像第八十八化紹興中縣官胡真喜道術建大齊于京城寶籙宫方土大集用技能者帝君詭姓氏寓焉自贊其能異衆取藥少許置諸掌吹數過俄紅暈四溢成寶輪相現洞賔兩宇衆大愕覓之不見矣詩彖天道能然匪技能才云法術眼昏瞢寶輪中顯天真性默得圓明證上乘藥救傅道人第八十九化江陵傅道人性純善平日敬事洞賔像甚切乾道中正旦獨坐鋪中俄一客方巾布袍入共語良久起曰吾有百錢能隨我酒肆中飲一杯乎傅從之自是旬日一來或留飮或與之飲時目昏多淚客教服生熟地黃切焙取川椒去枝目及閉口者微炒三物等分末之鍊蜜為丸空心米湯服五十丸傅如法服之夜能視物後忽見一真像與客貌類所遇洞賔像云詩彖共飲時來已見心豁開道性便圓明傅公想你福緣淺且救昏蒙肉眼晴長溪覓齊第九十化福州長溪縣老媪開飯肆常齊僧道過往者乾道中有道人來化齊老媪喜迎待問姓名不答食畢以火柴頭書壁作吕洞賔來四宇光艷奇偉自此飯店中人食衆太守聞之騎馬往觀則宇已銷沒無復餘迹太守自歎而回信神筆也詩彖間戲長溪化一齊飯婆善待問元來壁書直指人明道太守不知空自呆警趙兵馬第九十一化潭州兵馬都監趙不問淳熙九年四月十四日作鶴會一道人不知所從來攝衣齊所不與人揖徑入堂房內不見但於几上得一幅紙書絶句云這回相見不無緣滿院風光小洞天一劍當空又飛去洞庭驚起老龍眠末書云谷客書詩彖各職慈仁結道緣仙真感得降人天攝衣不揖真消息悟得身眠神不眠邵州索飲第九十二化邵州城外有老媪開酒肆每早晨供吕真人酒三杯至誠切切一日有吕道人索飮偶無酒媪以所餘濁酒一升與之道人問價媪曰每升錢二十道人以指點酒書二十字于門外一紫石及銅錢二文忽然隱去徐視之則宇迹與錢下透石底幾尺餘自是觀者如堵酒肆大售老媪年九十坐化後人因其居建康仙堂云詩彖清晨酌酒供真仙酒禮雖輕意不輕二十二文俄透石化人心善樂長生救劉氏病第九十三化越州貧民劉氏一病跛艱于行幾二十年每日炷香禱天乞已此疾虔誠備至一日有道人手携鐵瓢謁劉曰子疾易愈可隨我行劉隨之二里許指地下曰此下深三尺餘有五色石試掘之果得石大如彈丸五色殊常道人曰子可持歸暴露九日細末以木瓜皮煎湯服盡即愈可來城東駐雲庵東廊第三間左壁再相會云劉如其言服盡果然輕便若素無疾者即往庵中左右壁尋之無人但有洞賔像携鐵瓢詩彖身貧病楚正心堅誠禱高穹二十年假像寓言慈憫救脫然病愈步輕便覺章太守第九十四化潭州益陽縣楚興寺東有來真堂乾道中帝君曾遊題詩壁間有布袍拂出秋九月有章騆敬愛不已淳熙中章騆守嶽陽命工整治洞賔塑像夜洞賔稱謝且請曰子藏五金丹三成法書有年可傳揚後世俾衆見之大道不為一人私也既覺遂繡梓于郡齊廣其傳焉其三成法書自序曰嵒幼習儒教長好玄門志慕清虛心游雲水尋師訪友往來不憚於驅馳切問近思終始不生於懈怠陰陽升降取法於二儀性命根基歸元於一氣無形無相來時只一婦一夫有姓有名去後存三男三女九重臺畔金童採得黃芽十二樓前玉女收成白雪水中起火當分八卦之才陰內鍊陽自别九州之氣三花和會化火光直上昏衢千日功成驂鸞鶴元遊海島天機深遠不敢輕言道要玄微難於直述今以平日見功之法尊師已驗之符集成口訣一十八道密示後學凡金丹小成七訣天童不老一聚火煮海二匹配陰陽三聚火還元四散火鍊形五龍虎金丹六周天火候七金丹中成六訣河車肘後一肘後飛金精二玉液還丹三玉液鍊形四金液還丹五金液鍊形六金丹大成五訣集神朝元一鍊氣成形二體同太虛三出有入無四形神超脫五其書合三千言每訣四句每句四宇以明白之言發沓冥元精先天至神以此椎之與傳道集靈寶畢法相去遠矣詩彖頓漸三成非易難高明虛己返心觀靈泉化質丹臺瑩慧火鍊形欲海乾息念凝神全法像鍊精化氣駐童顔形神俱妙超生滅游泳先天不等間純陽帝君神化妙通紀卷之六
