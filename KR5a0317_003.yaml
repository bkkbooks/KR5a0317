front:
  text: 純陽帝君神化妙通紀卷之三帝三
  hash: sha256:9f5b32c8f2710fdeed71d3e2f82886a0eff352e2f677468a8c12c2b0a2599d7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_003-001a, image: hfl/0159/0159-048.png}
body:
  text: 玄門苗善時校正編次詩彖肥遁華峰第八化正陽師真授帝君口訣及破諸疑難説慧劍法畢乃曰十洲羽客至玉京吾朝元有期汝恐難久居此可往華峰羽谷修養待時亦當隨機利物行滿功成復相際會遂於洞口題曰春氣塞空花露滴朝陽拍海嶽雲歸再囑曰吾去後好住人間功德圓時亦當如吾升玉虛矣帝君再拜曰弟子之志則異於先生必須度盡天下衆生方上升未晚師曰小子勉之真心慈憫奈衆緣輕業重此去所度合有五百弟子襲吾道統者三五人而已比及邂逅相見珍愛寶重言訖與施太玉鄭思遠二仙乘雲軿金幢玉節羽儀仙樂冉冉而去帝君不勝依戀遂往華峰羽谷肥遁林泉實熙自牧四十餘年圓成道果故雍先生作碑文云晦迹華陰之羽谷四十餘年又道藏青童帝君丹訣載唐有進士吕洞賔得鍾離誘以道妙授金丹鍊形之道後居終南華峰修鍊功成形神俱妙神化莫測又李奇言祥符間為郎官時關中嘗見吕洞賔有神劍法年百餘歲貌如嬰兒行步如飛似此後或隱或顯優遊湖湘鄂嶽廬山方自莫知鬼神莫測又修真指玄圖載歷江州登武昌黃鶴樓以五月二十日午時化三級紅樓而上升遺詩曰靈芝無種亦無根解飲能餐自返魂但得煙霞供歲月任他烏兔走乾坤嬰兒只戀陽中母姹女須朝頂上尊一德不回千古內更無墓冢示兒孫彖章曰聖仙神化居止無常蹤迹不定故隱顯莫測莫知其鄉或有祠堂道院宫觀山川有顯迹處欲作碑記多不得人況得有名而無實者以己膚淺聞見一僻又不前後詳照真偽況有假托帝君自為以實其事者如望江亭記帝君常隱名惟恐人識豈有自言色服相貌變現不測之理以訛傳訛似此可椎愚亦不揣不肖於書史經集校照事實次序紀集庶幾體道志士一覽無疑矣後化三級紅樓上升亦一神化云耳惜乎不記年代幸有詩存襲明印第九化純陽帝君高尚其志不事王侯綽然方外頓超物表所以天下莫敢臣侯王不能友自别師後密隱華峰羽谷四十年餘自唐末間時人方知之故指示李奇奇壽百五十歲終焉度諸仙百餘人隱顯更名不一五代時又隱華山號無家宫至衣麻布袍人呼為麻衣道者以易理參同點化陳希夷先生與燕國相劉玄英即海蟾帝君也皆師事之海蟾帝君始遇正陽帝君示纍卵之危頓悟入道後隱華山修證後純陽帝君作心易授希夷先生即今傳於世麻衣心易是也又作仙統祕訣三篇授海蟾劉君今玄門達道師德心心相印而密授受今存金蓮寶籙中宋初别華山贈警希夷先生詩云青霄一路少人行休歎興亡事不成金榜雖云無姓宇玉京却幸有仙名雲歸大海龍千歲雪滿長空鶴一聲後感或作多謝清朝明聖主屢頒丹詔起先生後太祖太宗果三詔召之後再至華峰希夷先生巳上升遂留詩云天網恢恢可是疏為君筬到華山區寒星沒後留殘月春雪來時問太虛三洞真人歸紫府千年老鶴化蒼梧自從違却先生後南北東西少丈夫彖章曰真人授希夷先生易妙及心易希夷後授种放放授穆修修授周濂溪周授二程程授溫公司馬光海蟾帝君受易發明仙道復南授張紫陽張作周易參同契授石泰之後三傳至諸葛玉蟾又二傳至清庵李元素先生北授重陽帝君王某王乃以易妙河圖洛書分梨十化丹陽七真後開金蓮萬朵玉樹千株代不乏人皆祖襲純陽帝君之餘廕也五代時李守正叛據河中府周太祖御駕親征同趙太祖周世宗率兵攻城麻衣真人與趙韓王遙觀曰李侍中安得久乎韓曰何故曰其城外有三天子氣未幾城陷又文僖公錢若水其神采清粹希夷謂其可學仙見之未詳請真人決之曰無仙骨但可作貴公卿耳二事果然就記之云神應帝玉第十化宋藝祖神武皇帝建隆二年春帝於御苑龍亭宴坐偶見一羽衣仙人自東南而來帝忽見驚迎揖邀坐問仙真自何而來答曰自蓬萊山來問姓名帝君以手空中畫二曰陛下乃朱陵上帝還記憶否上默默帝君曰當以火德旺天下將定無勞聖慮當戒殺戮以無為清靜治化乃安留語移時帝惟點頭應諾後語祕不傳帝命侍從取酒果帝君辭帝急解玉帶赭袍賜之帝君笑飄然乘空而去帝悟曰乃吕公也命繪像于太清樓供養左街道録陳景元傳其像于世後滕子京所見與此絶類云詩彖五代興亡五十年天生英武定山川真人敬諫行清靜聖主誠膺允自然玉帶赭袍天子貴青巾鶴氅道人玄飄然舍笑歸何處回首雲勝天外天石肆求荼第十一化後周末汴京有石氏設茶肆一女尚髫齓令行茶帝君詭為丐者日往據上坐求茶衣服藍縷血肉垢污殆不可近女殊無厭惡意益取上茗待之父母怒笞女女益待帝君僅月餘帝君謂女曰汝能啜我所飮茗之餘乎女以垢甚不可下咽覆之地忽聞異香亟舐之神氣爽然帝君曰我呂先生非丐者惜爾不盡食吾餘然爾願欲富乎貴乎壽乎女曰我小家子不識何謂貴得富且壽足矣帝君去不復來女後適一管營指揮使已而為吳王之孫乳母所乳孫適宣仁聖烈高皇后叔父遵約受陽沐邑百三十五歲而終詩彖盧同七碗勿言佳紗帽籠頭豈足誇我祖龍涎方吐露忽焉遍地噴金花石家女子忙餐半富貴安康老健加若使趙州知此味等間平地步煙霞度老松精第十二化嶽州巴陵縣白鶴山下兩池潛巨蟒池上一老樹枝幹悉稿蔓草翳焉帝君過之有人自樹杪降而拜曰我松之精也幸見先生願求濟度帝君曰汝妖魅也奚可語汝道平日亦有陰德否曰池中兩蟒屢害人一云白鼉弟子每化為人立水次勸人遠避救活數百人蟒出化為劍錮之沉于泉帝君詩曰獨自行來獨自坐世上人人不識我惟有南山老樹精分明知道神仙過今巴陵庵前一老幹枯死旁一枝獨生乃神丹之力世號稚松又一巨石如墨狀乃帝君化石墨為者存焉詩彖真仙時行與時坐密密潛神誰見我已知木老救人多特特從容池上過一粒大丹應手揮兩條巨蟒隨風破吕仙亭下迹常存歷久不磨靈德大再度郭仙第十三化郭上竈乃老樹精後身一日帝君詭為丐者垢面鶉衣瘡痍淋瀝日往來啜茶不償一金求茶者掩鼻皆去自是經月不售郭無愠色益取佳茗待之帝君曰子可教也吾吕公耳子前生乃老樹精還記之否郭恍然若夢覺也曰幸見先生可教弟子學道帝君曰子欲學道不懼生死宜受一劍郭唯唯帝君引劍向其首郭大呼帝君俄不見郭怏怏自是遍遊雲水一日忽遇帝君遂得道後磁州趙長官奉之一日與趙長官言吾來日午時去也求一小棺首開一穴以竹竿通中趙曰諾來日午時郭果坐逝趙如其言瘞之河岸上以竹竿貫其穴重疊纍石護之至秋大雨河水溢趙掘之但見破絮無尸詩彖樹靈前已積陰功得報人身隱巿中一劍塵緣今世了數年法雨宿生通俗情泯息心無極天性圓明體太空何必化棺再陳醜故留蹤迹振家風謁鍾弱翁第十四化平凉節度使鍾傳號弱翁帝君幅巾白袍謁之從牧童牽黃犢立庭下弱翁異其氣象深廣進退間雅指牧童曰道人能詩可賦此乎帝君曰不煩我語是兒自能之牧童大書曰草鋪橫野六七里笛弄晚風三四聲歸來飽飯黃昏後不脫蓑衣卧月明既别人皆見其擔二大甕長歌出郭或報弱翁曰甕乃二口此吕公也亟追之不復見矣今世有貯其筆迹者真有翔鸞翥鳳之態信非凡人能也詩彖師父牧童已顯名長歌兩口振希聲弱翁追索空惆悵秪為緣輕性不眀警提丁謂第十五化丁晉公名謂倅鄱陽帝君往謁曰吾唐吕渭之孫也君狀貌大肖李德裕他日出處皆如之謂聞觸其諱不喜亦不敬待晉公果大謬而竄海外信似贊皇矣詩彖晉公才智極玲瓏可惜心偏性執蒙不悟警提李德裕至今羞見寇萊公讖張參政第十六化張公洎早年家居帝君謁之索紙筆作八分書詩一章微示他日將佐鼎席之意卒章曰功成將在破瓜之年後張果參大政後六十四歲卒俗以破瓜為八八蓋其讖也詩彖仙詩讖警破瓜年直指韶光不久堅可歎張公全不悟倏焉八八入黃泉度曹國舅第十七化曹國舅本傳丞相曹彬之子曾皇后之弟美貌紺髮秀麗敏捷本性安恬天資純善不喜富貴酷慕清虛年十二三歲三教經書一覽精通自幼出入禁中上及后妃皆愛敬之上每與語惟言清靜自然無為治政上甚喜嘗錫衣黃袍紅絛惟稽首謝而已一日辭上及后上問何往曰道人家信意十方隨心四海上與后阻當數次賜鞍馬人從皆不受上賜一金牌刻云國舅到處如朕親行遂三五日忽不知所往惟持笊籬化錢度日忽到黃河渡捎工索渡錢曰我道人家沒錢捎工毁罵逐下船遂於衣中取出金牌與捎工準渡錢舟中人見上宇皆呼萬歲捎工驚懼有一藍縷道人坐船中喝叫汝既出家如何倚勢驚欺人曹恭身稽首曰弟子弟子安敢倚勢能棄於水中否曹隨聲將金牌擲向深流衆皆驚拜道人呼曹上岸同我去來曹諾遂隨道人上岸同行數里在一大樹下歇道人問曹曰汝曾識洞賔否曹曰弟子濁夫何識仙人道人歎曰吾是也特來度汝曹再拜後同往授以道妙口訣修證仙果亦有仙文集傳留于世云詩彖物表英才性朴純天然氣象妙精神眼空四海全無欲心貫三才絶點塵帝賜金符微一笑師傳玉訣樂長春源緣慈父征唐德積一皇后二仙真度曹仙姑第十八化按曹仙姑傳純陽帝君遊河南一古寺中深夜有一圓寂僧影影來前作禮帝君詰之僧曰某甲元係本寺長老應對機鋒敏捷帝君曰可惜汝為陰靈爾僧歎曰何故帝君曰吾純陽隨機應變人皆見之汝何能也僧疑二問帝君曰汝不信今夜某人家設齋吾汝皆往赴齋若何僧諾同至齋所齋主迎接坐少時供齋一分帝君曰吾二人也再將一分來主家再進一分帝君齋了起謝僧唯吸氣而己主家問先生教某下兩分齋那一人何在帝君詭曰此人不知如何却又不來遂出僧却悟省遂再拜求點化帝君曰若得性命雙融形神俱妙必假父母元氣修鍊而成汝須往人間一番僧曰恐復迷昧了帝君曰吾自來提汝遂指往托化僧隨念直入京都城吻合曹皇后孕生女子帝君遙見恐後難脫富貴遂布氣醜其形三日皇后恐上見羞托他故送后親母養育後長成醜貌簪帶為女道流後帝君往警提仙姑即頓悟薰禮請問道妙帝君授玄關祕妙修證雙圓自此後舉筆成章今語録詩詞見行于世詩彖明心見性成圓學舉一無無都不著百年萬化已空亡一點靈眀何處托性命圓通體太空形神一混超天閣仙姑若不遇真師安證真空遊碧落度何仙姑第十九化何仙姑零陵市道女也始十三歲隨女伴入山採藥茶俄失伴獨行迷歸路見東峰下一人修髯紺目冠高冠衣緑銖衣即純陽帝君也仙姑僕僕亟拜之帝君出一桃曰汝年幼好果物食此盡他日當飛升不然止居地中矣仙姑僅能食其半髯者指以歸路仙姑歸自謂止一日不知已逾月矣自是不飢無病洞知人事休咎後尸解去帝君嘗謂仙姑曰吾曾遊華陰市中賣藥以靈丹一粒置他藥萬粒中有求藥者於瓢中信手探取與之觀其緣分也純陽帝君神化妙通紀卷之三
