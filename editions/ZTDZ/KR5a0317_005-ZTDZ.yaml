front:
  text: 純陽帝君神化妙通紀卷之五帝五
  hash: sha256:307111ac96d2e6cc7164dad323a99e63826e1fb886e74c7474fb88f8eb005cb9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_SJB_005-050718c, image: sjb/05/050718c.png}
body:
  text: 玄門苗善時校正編次詩彖齋大雲僧第五十一化帝君詭爲回處士遊大雲寺隨雲堂會食月餘謂寺僧曰僧饌甚精但少麵耳遂去旬日携少許麵至自庖設數百僧皆飽足僧智明請處士啜茶舉丁晋公詩曰花隨僧筯破雲逐客甌圓處士曰句雖佳未盡茶之理乃書詩曰玉蘂一槍稱絶品僧家造法用工夫兔毫碗淺香雲白蠏眼湯翻雪浪浮斷送睡魔離几席增添清氣爽肌膚幽叢自樂幽巖畔未肯移根入上都僧獻詩云求眞已得眞獨有吕君身篋裏惟詩句爐中皆藥銀性靈淳似古神炁煖如春異日雲橋路如何得少親處士和曰三千里外無家客七百年來雲水身行滿蓬萊爲别館道成瓦石化黄銀待賔榼裏常存酒鍊藥爐中别有春積德求師何患少由來天地不私親復以丹一粒遺僧曰服此可不死遂别去後僧亦仙去誘侯用晦第五十二化帝君遊江州廬山簡寂觀臨砌淬劍道士侯用晦問之曰先生何所用曰地上一切不平事盡皆去之侯心異之以酒果共飲謂曰先生道貌清高必非風塵中人帝君曰且劇飲无相窮詰既醉以筯點酒書劍詩一首于壁上曰欲整鋒鋩敢憚勞淩晨開匣玉龍嘷手中氣岸冰三尺石上精神蛇一條奸血默隨流水去凶膏全逐舊痕銷削平浮世不平事與爾相隨上九霄初若無宇既而墨迹粲然透出壁後侯大驚再因問劍法曰有道劍有法劍道劍則无形法劍則有術治之者此俗眼所共見第能除妖去崇耳問曰今以道劍戮奸人于稠衆中得不驗俗乎曰道劍則忠劍惟斬自己邪妄耳法劍術也則不然以神爲母以炁爲子神存則炁存神去則炁散但珍其神而寳其炁以此戮不正鬼神之類也侯曰眞仙之言也願問姓氏曰吾吕巖也言訖因擲于空中隨之而去良乆不見侯乃恨恨而已遊戲虹橋第五十三化蘇州垂虹橋一日有藍縷道人至携酒于橋亭上悠然獨酌嘯詠終日神氣飄然衆計其所飲自旦及晡己非人量所及亦无酒容或詢其姓氏道人取佛前香爐灰燼題一詞于柱上飛梁壓水虹影沉清曉橘裏魚村半烟草筭今來古往物换人非天地裏惟有江山不老雨巾風帽四海誰知道一劍横空幾番到玉龍嘶未斷月冷波寒歸去也紫極洞天誰鎖指雲屏烟障是吾廬任滿地蒼苔年年不歸畢書吾洞賔也衆驚趍之俄不見訪孽鍊師第五十四化江州太平觀薛道士有高志帝君過之贈詩曰落魄薛道士年高無白鬚雲中閑卧石雪裏冷尋碑誇我飲大酒嫌人說小詩不知甚麽漢一任輩流嗤末小書云回道人同三客謁薛鍊師作始知洞賔併寓其字誘甯道士第五十五化宿州符離縣天慶觀有甯道士少談莊老有奇趣一日晨興有賣藥道士至即洞賔也儀狀雄偉往來彌月帝君欲度之不契臨别題二絶句于扉上作大篆體勢飛動一曰秋景蕭條葉亂飛庭松影裏坐移時雲遮鶴駕何方去仙洞朝元失我期二曰肘傳丹篆千年術口誦黄庭内景經鶴觀古壇松影裏悄无人跡户長扃旣去人爭剖之以治病良已宇入木寸餘墨跡不減度侯行首第五十六化兖州妓侯其姓者家爲邸舍客帝君詭服求授館蚤出暮歸歸大醉逾月不償一金侯召啜茶洞賔曰吾見鍾離先生謂汝可與語道侯不省以酒飲之帝君索飲不已滋不悦帝君伸臂示之金釵隱然解其一令市酒侯利其金曰飮罷寢此乎曰可也即登榻鼻𪖙𪖙至夜分侯迫榻帝君以手拒之叱侯亟去遲明失帝君所之視其背則手所拒處吕宇徹肌肉侯感悟曰此吕公也得非宿世一念之差遂至于此公來度我乎即斷髮布裘尋洞賔復遇授道遂隱去不知所終誘尚書第五十七化尚書郞賈師雄藏古鐵鏡嘗欲淬磨帝君稱回客謁焉初但言道賈不悟次日乞試其技笥中取藥少許置鏡上辭去曰候更取來藥跡已不見但見所寓太平寺扉上題詩曰手内青蛇凌白日洞中仙果艷長春須知物外烟霞客不是塵中磨鏡人誘曠若谷第五十人化青城山丈人觀道士曠若谷風骨清峻戒行嚴潔常以天心符水三光正炁治疾良驗而得人錢帛即以散施貧乏帝君詭爲賔法師上謁留月餘所作符篆往往吹起皆爲龍蛇霧雲飛去治鬼召將必現其形通人言語足踏成雷曰激成電呵炁成雲噴咳成雨又善畫不用筆墨但含墨水噴紙帛上自然成山川花木宫室禽獸人物之象略加拂拭而已賣畫得錢即巿酒與若谷痛飲若谷飲素無量每爲賔所困一日若谷問曰先生操行異常人必自神仙中來還可語吾道否曰子左足北斗七星缺其一奚能成道耶更一生可也若谷驚曰賔公殆聖人也蓋我左足下有黑子作北斗七星狀而缺其一未嘗爲人所知故也復問壽幾何帝君倒書九十四字于壁作兩圓相圍之即别去始悟兩圓相乃吕字而姓也後若谷九十四歲卒果符倒書之讖也詩彖先生元炁鍊玄玄感應隨機法自然若谷傲然輕問道更生一世亦無縁度翟筆師第五十九化渌江筆師翟某喜接方士帝君往謁之翟館于家禮遇殊至自是往來彌年一日挈翟遊江滸囓筆管爲兩片泛于波上帝君履其一引筆師效之翟怖不敢前帝君笑而濟及岸俄不見翟始知其異人也旬浹復來自挈飲食食翟皆臭腐矣翟閉鼻謝弗食帝君太息曰若不能惡食吾以肉醬雨瓿遺君遂去不見開視醬瓿皆麩金也兩瓿者非雨大甕之類也詩彖往來提警一年餘必是翟公德不孤不上管舟嫌臭食可憐无分赴仙都度黃鶯妓第六十化廣陵妓黄鶯有姿色豪客墳門好濟貧布施一日有吕秀才即洞賔也托宿黄以其藍縷垢污拒之秀才題二詩于屏一曰嫫母西施共此身可憐老少隔疏親他年鶴髪鷄皮媪今日玉顔花貌人二曰花開花落兩悲歡花與人還共一般花在枝頭防客折落來地上請誰看題畢俄不見黄悟欲抉目詩彖幻化形骸假合身貪財好色喪眞親行藏語默奚爲主誰悟中中的主人又曰終朝賣笑與追歡幸積陰功有幾般德感眞仙來救拔可憐福薄不相看遊戲岳陽第六十一化帝君遊岳陽詭名賣藥一粒千金三日不售乃登岳陽樓自餌其藥忽空而立衆方駭悟欲慕其藥帝君笑曰道在目前蓬來跬步撫機不發當面蹉過乃吟詩曰朝遊北海暮蒼梧袖裏青蛇膽氣麤三日岳陽人不識朗吟飛過洞庭湖詩彖仙遊翺若鳳栖梧隱顯全忘精與麤靈藥度人人不識德風吹此滿江湖救趙監院第六十二化監文思院趙應道病瘰幾危委頓泣别親舊吾死矣夫閣闔有之物皆捨得獨鶴髪老親與托奈何語未竟俄有一道人扣門語趙曰病不難愈也取紙二幅各掐其中爲二方竅徑可二尺許以授趙曰俟夜一幅灰之調乳香湯塗之病上留一幅以待後人言訖别去趙貼藥自夕迨曉即愈大驚喜覓道人不復見矣始悟兩方竅乃吕宇也詩彖趙公敬母德充天孝感慈尊兩口仙病愈求眞眞已遁不明救後乃心傳誘崔進士第六十三化崔中舉進士道過巴陵寓旅邸歌沁園春樂章帝君適意蒲溪隱巿井間質其所歌崔曰東都新聲也曰吾和此詞不解書吾唱之子爲吾書也崔爲書其詞曰七返九還丹在人先須鍊己待時正一陽初動中宵漏永温温鉛鼎光透簾幃造化爭馳虎龍交媾進火工夫牛斗危曲江上見月華瑩淨有箇鳥飛當時飲刀圭又誰信無中養就兒辨水源清濁木金間隔不因師指此事難知道要玄微天機深遠下手速修猶太遲蓬萊路仗三千功滿獨步雲歸崔問姓氏曰吾生江口長山口今爲守谷客翌日訪太守言之太守曰此吕洞賔也亟令召之叩其户應聲漸遠再呼不應椎户而入閴無人矣壁有詩曰腹内嬰兒養己成且居廛市暫娱情無端措大剛揺舌却入自雲深處行崔與太守歎恨无己乃和詞曰自己陽生正是中虚靜極動時默地雷微震衝開玉户天心朗徹放下簾幃眞火冲融靈泉復凑不昧谷神何險危自然妙若三川龍躍九萬鵬飛中中二土成圭意眷戀濃如母䕶兒這恍惚眞容不空不色窈冥妙象無識無知命住丹圓全眞體道奮志精修休自遲收功了把三才全理一貫全歸詩彖雙圓性命大丹成師憫仁賢喻道情太守旣明親拜謁祖師安肯綽然行成都施丹第六十四化成都藥市日有道人垢面鶉衣手持丹一粒大呼于市我是吕洞賔也有能拜我者以丹餌之衆皆以爲狂相聚戲笑或加淩侮道人不顧如是往還巿道上數回迨夜意無人拜之者道人往坐五顯靈觀廟前火池上兒童爭以瓦礫擲之道人笑曰世人欲見吾甚切既見吾而又不識吾亦命也夫乃自餌其丹俄五色雲周身有頃不見衆共悔恨詩彖一粒金丹度有縁明明直示反生烟世人薄福縁輕甚覿面眞仙不悟玄誘陳澹然第六十五化陳澹然富而儒者也性慕道延雲水士多年竟无所遇帝君詭爲傭者爲治圃歲餘所作工役力倍常人陳愛之然止以傭者待之而已一日陳與一道友講陰符經至天發殺機龍蛇起陸人發殺機天地反覆未曉殺機之㫖傭者從旁抗聲曰生生者不生死死者不死己生而殺生未死而學死則長生矣陳大驚曰汝非傭者耶誰教汝爲此言旣而詰之則復謬悠其辭不可解道友曰田野村夫定於何處竊得此語耳非實通曉也居无何忽辭陳曰吾將遠行明年五月五日復來也既去寂然陳有鄕人客于巴陵遇之曰爲寄語陳公我洞賔也始可授道徐察之則不然吾不復來矣言訖走入吕仙亭前竹林中不見明年端午日午時陳暴卒詩彖慕道參師即有年眞仙臨降了无縁明言生殺无生妙何故澹然空澹然誘太守奕第六十六化武昌太守倅一日對弈有一道人不通姓名直前曰吾能也守試與弈纔下僅八子即曰太守負守曰汝子未盈局安知吾負道人曰吾子以分途據要津也是以知之已而果然如是數局守皆負道人俄拂袖不見守令人遍城尋之聞在郡治前吹笛纔至郡治前則聞笛聲在東門至東門則聞在西門至西門則聞在南門至南門則聞在北門至北門則聞在黄鶴樓前道人走往石亭中不見但見亭中有詩曰黄鶴樓前吹笛時白蘋紅蓼映江湄衷情欲說无人會惟有清風明月知末小書一吕字詩彖棋言勝負露機時皎月當空照水湄空自隨聲四門亂局中一著不能知度七子第六十七化刀鑷工陳七子夫婦坐茶肆梳剃一日有道人携一白金求剃鬚髪纔剃即生旣生隨剃如是自旦迨暮夫婦手幾脱腕知其爲異人也幸教某道可乎道人曰吾翌旦至陳早起待之不至累月寂然陳棄業浪迹雲水求之數十年竟无所遇意稍懈思歸去家纔五里許忽見道人自山中出曰吾吕公也子精忱如此何患不成道乎乃授以丹訣併與詩曰携手三清玉帝鄕宿生縁契不尋常與君一轉金刀手削去滿頭無限霜自此七子精修成證後與師偕往詩彖十載灰心返故鄉眞仙憐憫語眞常三冬凍地生紅焰六月炎天降雪霜武昌貸墨第六十八化帝君遊武昌城詭爲貨墨客墨二笏僅寸餘而價錢三千連日不售衆皆笑侮有鼓刀王某曰墨小而價高得无有意耶自以錢三千求一笏且與客飲醉歸昏睡午夜俄有叩門者乃客以錢還辭去比視墨紫金一笏上有吕字遍尋客以不復見詩彖一墨三千意甚深數朝无一是知音鼓刀王丈雖高見秪得金兮不得心穢梳高價第六十九化帝君遊武昌天心橋鬻敝穢木梳索價千錢連月不售俄有老媪行乞年八十餘龍鍾傴僂秃髮如霜帝君謂曰世人徇目前襲常見吾高價貨敝穢物豈无意而千萬人中咸无起卓之見尚可與進道耶乃以梳與媪理髪隨梳隨長鬒黑委地形容變少衆始神爭以錢求梳帝君笑曰見之不識識之不見乃投梳橋下化爲蒼龍飛去帝君與媪不見詩彖穢梳誘俗價千錢連月无人達此縁萬髪梳通人始愛化龍倏爾上雲天醉衝節儀第七十化帝君遊巴陵巿太守陳甫出犯節前驅執太守置諸獄令書款目迨晡无一辭吏趣之洞賔曰須我醉醒吏云汝不能憂罪尚以酒爲解耶言未竟俄失之但遺幅紙曰暫别蓬萊海上遊偶逢太守問蹤由身居北斗魁罡下劍掛南箕月角頭道我醉時眞是醉不知愁是怎生愁相逢何事不相認却駕白雲歸去休太守曰此吕公也夙興焚香謝過一曰方贖水盆中見焉亟召畫史圖之與滕子京絶類也詩彖和光混世樂天游不自由時也自由火息靈宫冲妙徼水潛慧海徹源頭壺中自有全眞樂心上都无半點愁太守遇眞如感悟好當勇退死心休度施肩吾第七十一化施肩吾宇希聖唐亦有肩吾柳眞子如此兩鐵拐三馬自然溢浦人少業習佛博經史攻詞章而學道隱居豫章西山遇帝君教以五行顛倒之法三田反覆之義或以鍾吕傳道集會眞記皆施所編也道成之曰作詩曰重重道炁結成神玉闕金堂逐日新若記西山學道者連余即是十三人詩彖傳道集奇怪亂神西山記革德惟新二書果是先生譔誑誤閻浮多少人度劉跛仙第七十二化長沙劉跛仙遇帝君於君山得靈龜息炁之法功成歸隱岳麓號瀟湘子常侍帝君往來黄洞併數遊城下有詩曰南山七十二獨愛洞中墟後有鄭愚者遇跛仙于清泰門外相與仙去詩彖跛仙劉子行功深誠感仙師點化心息炁靈龜綿密密形神圓混振希音度陳進士第七十三化陳非閩中進士自羅浮來遊南岳俄遇帝君陪連旬日陳薰禮問道帝君曰喜怒哀樂未發之謂中汝以何爲中陳默然書一帝君曰此性理也何謂天命陳再拜帝君默授之遂得道後謁宜春李觀言洞賔度老樹仙本末今隱南岳永康軍詩彖冰釋科名罷論書頓忘者也與之乎虚中至道明天命一點靈眞體太虚誘太公第七十四化倪某新開酒樓有一道人至索飮自旦及暮飮佳醖已及石餘衆怪相聚以觀倪索酒金道人瞪目不語頽然醉倒倪坐守之曙鼓動道人忽起援筆題詩于壁曰鯨吸鰲吞數百杯玉山誰起復誰頽醒時兩袖天風冷一朵紅雲海上來末書云王山道人陽純作以土一塊擲倪面走出門仰望東北一朵紅雲飄然而來撫掌大笑俄不見刮視其壁墨徹數分視士塊乃良金也自是酒樓大售始知陽純乃純陽也詩彖欲度倪公弄酒杯直言誰起復誰頽黃金擲面猶迷昩安得回光見本來誘楊柳金第七十五化徽宗時有道人自稱昌虚中往來諸琳宫動履怪異飮酒无量啗生魚肉至數十斤引冷水數十斛大雨雪平地六七尺餘自埋於雪中旬日不出雪霽復起行于深潭水面如履平地及善草書作枯藤游絲勢一舉筆數千字絡繹不斷人爭携楮以請然往往不與時有妓陽柳金東都絶色也道人往來其家警提楊終不悟又屢輸金帛然不與楊交接楊一夕乘醉進之道人曰吾先生坎離配合身中夫婦内交聖胎已結嬰兒相生豈復戀外色内交之樂過於外之樂遠甚楊終不悟疑訝其語時宰相張天覺館賔蕭某與楊乆狎楊以吿蕭而蕭以告張遽往即之道人大呼疾走徑趍栖雲庵雲堂不出良乆排闥尋之則已不見惟壁上有詩曰一吸鸞笙裂太清緑衣童子步虚聲玉樓唤省千年夢碧桃枝上金鷄鳴張曰昌字虚中此吕公也後庵遭火無孑遺詩巍然獨存亦一異也詩彖不侵寒暑體輕清數警嬌娥離色聲身内陰陽提不悟空教丹鶴九臯嗚廬山放生第七十六化崇寧間有客航海橫風飄至一島有洞天見金樓門牌上玉宇曰天仙院一老人在門首客作禮問曰此何福地老人曰此洞天也此處隔凡絶世人惟吕洞賔時來此游戲其人問姓氏曰吾即唐裴休也客曰有缺文到廬山尋問前事彼處人俱說近有一道人見酒肆家剖活魚作鱠道人不忍遂化其人放生主家不從曰吾令此魚活耳鱠者不信道人以藥一粒捺入魚腹中隨手跳躍衆人大驚遂放之江其魚圍圉洋洋悠然而去道人隨不見惟以沙灘上書回客二字海客記前日在海洞時與放魚日同本人遂捨家入道詩彖海客飄舟至洞天必然夙世有仙縁回聞魚死復開悟何若洞天便拜仙警提刑第七十七化帝君遊江夏詭爲吕元圭往來居民楊氏家爲人言禍福事其驗如神就警提人悟道一日忽辭去曰惡人至矣吾將避之是日提刑點獄喻某行部至鄂首覓吕公已不見得其平日所與往還者岑文秀詰其所得岑曰无有喻勵以聲色將罪之岑答如故喻命搜其家得所遺岑長歌一首論丹訣事喻省之曰此吕先生也元圭者析先生二字耳惡人者謂喻迫之云詩彖來往楊家勸誘人就中欲警喻提刑偶知喻老心多詐拂袖歸歟往玉京度姚道眞第七十八化合州姚道眞少爲長年三老操舟三峽帝君使負藥笈往來荆襄凡周歳俄洞賔遊洞庭坐水面招道眞道眞股慄莫前帝君以杖挾之曰分未應仙耶既時舉藥十二丸大如粟曰歲星周則餌一丸服畢不死自此過龍則復憤勿適清河由是不食或寢旬曰乃寤炎天擁重裘盛冬裸冰上後至通川有地名龍復鎮遂居之崇寧四年郡人何適病狂力致道眞適所居有水名清河道眞忘帝君言不覺三涉之適往迎致儀仗頗侈太守史某見之以爲妖械道眞與適下獄道眞曰吾忘眞人言宜抵此尚何悔焉面覆于地七日尸解詩彖侍師復復整三周磨鍊塵凡尚未休一死頓忘前一步仙師必引赴瀛洲題詩天慶第七十九化帝君遊秦州天慶觀時道流悉赴鄰郡醮席獨一小童在帝君求筆欲書童辭以觀新修師戒勿污壁乃曰但煩貯火殿爐欲禮三清旣往見殿後池水清沘以瓜皮畫壁曰石池清水是吾心浸彼桃花倒影沉一到邽山空闕内清閑塵累七絃琴末題云回後養書壁絶高非手所能及衆歎異始悟回爲吕而後養者先生反對也詩彖寂朗虚空即道心无情日月自升沉清堂誰是知音者空鼓无絃一操琴度張珍奴第八十化吴興妓張珍奴性淡素雖落風塵每夕沐浴更衣炷香告天求脱去甚切宣和中有一士人訪之珍奴見其風神秀異殊敬待之置酒盡歡而去明日又至如是往來幾月餘終不及亂張訝而問之曰荷君眷顧甚乆獨不少留一宿罄枕席之娱豈下妾猥陋不足奉君子耶士人曰不然人之相得但貴心相知耳何必是哉他日酒半問珍奴曰汝平日更何所爲曰失身於此又將何爲但每夕告祈願了此債耳土人曰然則何不學道曰迫於口體何暇及此且何從得師乎士人曰吾爲汝師可乎曰果爾則幸矣即起整衣炷香拜之既去浹旬不至張方獨處偶自書曰逢師許多時不說些兒箇及至如今悶損我援筆未置間士人忽來見所書笑曰何爲者張匿之士人曰示我何妨乃示之士人續其後曰别无巧妙與你方兒一箇子後午前定息坐夾脊雙關崑崙過恁時省氣力思量我張珍奴大喜再拜敬謝自是神氣豁然若有開悟亦密有所傳張不以吿人然未知其誰何也累月告别張設宴餞之臨歧出文宇一封曰我去後開閲之及開封乃步蟾宫樂章一首曰坎離坤兊分子午須認取自家宗祖地雷震動山頭雨要洗濯黄芽出土捉得金精牢閉錮辯甲庚要降龍虎待他人問汝甚人傳但說道先生姓吕張遂齋戒謝賔朋繪像事之修其訣逾年尸解而去詞彖和曰陽復乾純陰姤午象帝先是吾元祖一氣氤氲降甘雨恍然大浮黎土无極極中誠密錮玉龍蟠幽囚金虎主人輕鼓没絃琴全不屬宫商律吕純陽帝君神化妙通紀卷之五
