front:
  text: 純陽帝君神化妙通紀卷之七帝七
  hash: sha256:6e47517d9e27c17560638393914532d70ed7a9e0cbb86ffe16785984bd1fb4e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_007-001a, image: hfl/0159/0159-160.png}
body:
  text: 玄門苗善時校正編次詩彖度開先僧第九十五化廬山開先寺僧法珍坐禪二十年頗有戒行一日入定坐見一道人來謁問曰師謂道惟坐可了乎珍曰然道人曰佛戒貪嗔癡婬殺爲甚方其坐時自謂无此心矣及其遇境遇物不能自克則此四種心紛飛莫禦道豈專在坐因與珍歷僧堂見一僧方睡酣謂珍曰吾偕子少坐于此試觀此僧良乆見睡僧頂門出一小赤蛇長五寸餘縁床左足至地過涕唾食之復循溺器飲而去乃出軒外渡小溝繞花臺若駐翫狀復渡道人以一桶水傾漫小溝以溢而退道人當其來徑以小刃插地迎之蛇見畏縮尋側徑至床右足循僧頂門而入僧睡驚覺問訊道人及珍曰吾適一夢與二子言之初夢從左門出逢齋供甚精食之又逢美酒飲之因渡門外小江逢美女數十恣觀之復渡一小江水驟漲不能往遂回逢一賊欲見殺走從捷徑至右門而入遂覺道人與珍大笑而去謂彼足爲門以涕唾溺爲供醖以溝爲江以花木爲美女以刃爲賊人其夢寐幻妄如此珍曰蛇者何道人曰此僧性毒多嗔薰染變色已成蛇相他日瞑目即生于蛇中矣可不懼哉吾吕公也見子精忱可以學道故來教子僧遂禮敬求點化後隨之而往而莫知所終詩彖珍僧德行異常人我祖垂慈救出塵道種昏蒙因愛慾佛心迷昩爲貪嗔四端泯絶明元主一性圓純見本眞警策睡僧方了悟同師天外樂長春遊沈家園第九十六化湖州沈惟心慈善多陰德其家園最勝慶元中有一客青布袍巾徑入游翫形狀頗異守園者急白主人尋伺已不復見但於後亭壁上見一詩章曰萬里來遊蜀道長杖藜閑翫百花莊誰家鷄犬千家市中有神仙一島藏乳燕鳴鳩春自在落花飛絮水微茫主人了却明寧事向此重開緑野堂末云向道人作或謂向者回宇之轉必洞賔也詩彖誠信壺中日月長水山景物隱仙莊比如世上險中顯好向雲根深處藏厚實和同方士樂虚華糚點俗夫茫沈園秀麗皆凡景何若京山白玉堂度楊太明第九十七化南康楊太明事親孝親喪已廬墓三年然後歸方廬時七月七日帝君來謁曰子八月有厄服吾藥則无恙腰間出一小壺取藥投太明吞之己而掯椸上布袍曰能與我乎太明唯唯帝君納諸壼中太明滋惑帝君笑曰吾何是哉姑試子耳復探諸壺還之俄取杯水投之藥以手撓之頃之藥聚如彈丸光彩奪目謂太明曰願餌之乎太明答曰稍遲帝君即自餌之徐曰擬議即非也子居此良苦亦思所以給朝夕否吾有以遺子乃取土一塊嘘之成紫金太明謂以利餂我却不受帝君蹴金成石太明曰諸公皆有詩遺我道人能之乎帝君應聲援秃筆拂地三四濡杯水大書其壁曰楊君眞確士孝行洞穹壤皇天憐其難七夕遺追往逡巡藥頑石遺子另饋享子旣不我受吾亦不知强風埃難少留願子志勿爽會當首鼠紀青雲看反掌末書回客贈即辭去其字初若暗昧不可識已而色渥如赭入壁數分至子年正月眞人來與之偕往焉詩彖眀通道一源迷昩中霄壤天地惟降升烏兔自來往清虚世鮮明富貴人爭享仙祖苦提撕太明誠勉强心空性眼明息炁神清爽不悟若隔山了明如視掌度喬二郎第九十八化京師喬公二郞家富豪好禮英勇撝謙和順同人仁慈利物施棺木埋葬孤貧設粥飲接濟餓殍常齋道敬眞仙是以得感祖師會遇自相見以來求錢物以濟人或索酒飲至大醉喬欣然取與並无慳吝時以狂放語言逆觸如此往來一年有餘喬公並不動心故祖師力救入道修眞臨辭贈一長篇云與君相見皇都裏陶陶動便經年醉醉中往往愛藏眞亦不爲名並爲利勸君休戀浮華榮直須奔走烟霞程烟霞欲去如何去先須肘後飛金晶金晶飛到上宫裏上宫下宫通光明當時玉露涓涓生奔到元海如雷聲從此夫妻相際會歡娛踴躍情无外水火都來兩半間卦復翻成地天泰一浮一沉陽鍊陰陰盡方知此理深到底根元是何物分明只是水中金喬公喬公急下手莫逐烏飛兼兔走如何修鍊作眞人塵世浮生終不乆人道長生那得來自古至今有有有彖和超出乾坤奚表裏醺醺默默常如醉和光混世了神功弘道度人多美利寵辱不驚誰顯榮逍遥遊戲恣鵬程萬縁洒落清冰室一點圓明瑩水晶靜鼔瑶琴清浩炁閑携玉麈震希聲樞機圓活風雲會撥轉玄關无極外清肅玄風萬籟澄冲融元炁陽和泰坎内眞陽離内陰坎離旣濟密幽深霎時妙合中宫混純一乾陽體健金擊碎虚空不用手没脚童兒善飛走金童罔象撥玄珠慧命壽同天地乆有人或問此天機向道眞元中妙有正君心非第九十九化徽宗政和二年駕幸寳籙宫設供齋畢上問道衆能有異術否能化汞爲銀否衆无答最下有一道人越次而出化汞爲銀猶有所因不足論貧道專以土爲之上駭異即命爲之遂以泥和作銀錠入爐用火煅之須臾霞光四出遂成眞銀道人曰尚欠光澤容貧道歸邸取藥旣去乆不至上令近侍催促宣召已不知所向上命開爐取出得花銀一錠上有絶句詩一首若模鑄成其詩曰世上紛紛鍊汞銀大都宜假不宜眞太平宰相張天覺四海閑人吕洞賔上及官道衆駭愕懊恨不識眞仙次日上命再設齋醮謝詩彖吁嗟嗜利問燒銀邪見昏心喪本眞深警太平無宰相蒙塵宜住作朝賔度黃先生一百化帝君遊梧桐山見黃一中棄儒入道篤志皈眞建庵接待四方雲遊道友數年未嘗少怠一日帝君求掛搭黄見非常每日敬待之帝君亦逆意試其心黄愈加誠謹始得受密印黃自此大洞徹明臨别告求法語于是贈一長篇吾有玄中極玄語周遊八極无處吐雲軿飄從到定陽一見君子在玄浦知君本是孤雲客擬話希夷生恍惚无爲大道本根源要君親見求眞物其中有一分三五本自无名號丹母寒泉歷歷炁綿綿上透崑崙還紫府浮沉升降入中宫四象五行齊見土驅青龍擒白虎起祥雲下甘露鉛凝眞汞結丹砂一派火輪眞爲主旣修眞須堅確能轉乾坤泛海嶽運行天地莫能知變化鬼神應不覺千朝鍊就紫金身乃致全眞歸返朴黄秀才黄秀才既修眞須早早人間萬事何時了貪名貪利愛金多爲他財色身衰老我今勸子心悲切君自思兮生猛裂莫教大限到身來又是隨流入生滅末書云昌虚中留此片言用表其意他日相逢必與汝訣莫退初心善養善養後三年黄偕隱去詩和彖假象强名留妙語慈雲法雨如龍吐道風鼔舞肅靈臺寳鑑圓明輝藥浦昌字虚中字谷客無方神化恍兮惚教人養性了眞心直指虚空忘幻物精神魂魄意爲五五者爲子中爲母虚中五炁朝一靈一靈密混潛玄府性天朗朗即浮黎靈地肅清眞淨土雲從龍風從虎誠感合兮全體露竪指舒拳是識神揚眉瞬目非眞主造玄門志誠確我祖九年潛華嶽心无妄偽乃全眞性不偏邪惟正覺一念虚寂復本然機心泯没全純朴樂象先須趁早事休休心了了紫金闕内禮三清白玉堂中侍九老超萬法離一切慧劍光寒心决烈神凝空碧樂无生性體玉虚常不滅度玉祖師一百一化重陽帝君本傳玉其姓初名中孚宇允卿咸陽大魏村人母懷二十四月餘生而聰敏及長儀觀魁偉廣顙巨目髯鬚長美志操清高不拘小節文武皆備天春初試武略中舉易名世雄宇得威好布施利物濟人多有陰德嘗歎曰孔子四十不惑孟子四十不動心吾年已過猶碌碌世間不亦愚乎一日師飲于甘河鎮酒肆中忽有二人形質面貌一般各披氈衫而坐笑視師驚異之二仙遂去師亦隨其後至止處便作禮懇告求點化二人徐言此子可教遂以性點省師頓然開悟二仙再囑云此心明性著之妙末後大事待汝塵累冰釋業縁鎔化吾以汝師分付師即海蟾更名嘉字智明自此狂縱人以爲害風目之師受之亦自以爲名詳二仙即兩口吕仙也祕授重陽第一百二化重陽帝君自廿河鎮得點化之後徉狂自樂不以萬事干心遂斷縁釋累去俗離塵一年有餘忽有二仙青巾布袍各懸二袋倒插一扇師瞥見認是前披氈衫先生便拜呼師父相邀入酒館中酒闌請問姓名俱不答後辭去指海蟾劉仙翁此汝師也重陽敬禮遂傳密印眞空慧命之㫖及授祕訣五篇囑曰汝熟了焚之吾乃正陽師父之弟子純陽子是也遂拄杖與海蟾乘風而登雲漢矣警鍾仲山第一百三化長沙鍾仲山嘉定己巳自金陵罷官歸舟次巴陵南津晡時俄睹一舟過焉舟中一黄襖翁風貌奇庬凝然佇立熟視仲山良乆仲山窺其篷中无他物惟船頭有黑瓶罐十枚篷前兩青衣童子參差立仲山意其必徑渡旣而僅行二丈許即回棹而黄襖翁已復端坐篷後矣二舟相幫行約一二里再熟視仲山良乆俄失船所在仲山始謂爲巨商不與之語至是恍然驚訝知其爲異人也翌日往吕仙亭禮拜眞像果儼然衣黃衣亦有兩童衣青衣侍側其貌皆與昨曰所見者肖也仲山自恨凡目不識神仙感歎无已周星作水調歌頭詞有更南津港再遇吕翁船之句次年下世仲山之孫景瞻嘗出其祖所繪黄襖翁眞示人誠以清峻絶俗云遊寒山寺第一百四化帝君遊寒山寺在蘇州閭門外五里就歇一夜風大作本寺塔鈴玎璫聒耳次日不止早本寺長老待茶問姓曰姓吕坐間因言一夜風吹鐸鈴聒惱人長老戲曰爾是吕先生何不禁其鈴休響帝君笑遂吹炁禁之隨果不響僧驚訝仰觀遂隱去長老方省眞吕先生也後僧取下舊鈴换上新鈴至今亦不響儀眞繪像第一百五化眞州天慶觀先知觀常奉純陽眞君一日發心糚塑供養胎骨木植及泥作下匠者失期不至忽一秀才投宿知觀正怒秀才問其事勸曰小生善塑休動心來日小生結縁塑了知觀喜待至夜己醉安歇至來日方丈請早齋覓之已去知觀正嗟歎兩三道衆來言昨夜廊下祠堂内誰塑一吕眞人像知觀驚觀之果然其像清奇神彩收一足端坐衆皆喜慶謝齋謝之凡有祈禱无不感應後三遭回禄其像獨存見碑記事實于觀度關眞人第一百六化四明關眞人本貧家女自幼有出塵志年十六父母將許嫁關不悦走入深山不歸飢甚拾橡栗而食忽有一老翁鬚眉垂地眼碧有光指關腹一畫曰吾已與汝斬赤龍矣自是可入道關拜問道翁密授玄㫖關謝曰然則殽糧之累不息道奚可代老翁曰此易耳袖中出一橡子大如彈丸光彩絢爛曰食此即不飢關食之移時方盡俄不見旣歸即不喜烟火食惟啖果飮水无復天癸動履若神父母不復强之嫁淳祐中召至闕庭謝后愛之度爲道士錫號眞人當奉敕代太后降香至天師龍虎山壇所一羽流見之謂人曰肌膚纖麗眉目如刻畫宛然天女神炁澹然清雅非凡關作女仙傳七卷自言遇老翁即洞賔眞仙云丹度莫敵第一百七化楊州老兵官莫敵自解名籍家居奉道多化人積善消愆常齋道友濟貧苦一日有道人遇之問曰汝所學何道耶莫曰吾平生懺悔殺人罪耳安敢望道耶吾束髪從軍大小百戰殺千百人今年七十三矣老來頗以爲恨時見寃魂道人死生一揆罪福本空心以爲罪則罪狀自見心以爲無罪則惡相皆無寃家形影皆自心生非實有也古人爲太善大惡極處一念迴機其力甚大乃引莫臨水次果見百餘人血身淋漓來莫左右莫驚泣哀求道人一喝其寃魂皆散去遂以丹三粒與之曰服三粒則成天仙二粒則成地仙一粒則爲地下主者莫置丹掌上一粒升空一粒墜地一粒則服之道人曰分止此耳莫拜問姓名乃以指畫空作吕字遽别去莫自是絶烟火食知人休咎年百三歲端坐而逝焉度張和尚第一百八化衡山僧智玄張其姓也一日遊衡山紫蓋峯修眞院遇帝君共語機鋒敏絶契合帝君曰華嚴經釋迦佛與多寳佛入塔融會紫金榻上不分左右說何事僧无答遂作禮問答曰此佛祖正法眼藏眞相空實教外心傳之妙二佛融會性命雙融也不分左右體一太虚也汝執一邊以見性爲能了何其偏乎僧再拜求點化遂授密㫖僧曰不遇眞師幾乎誤此生帝君點化首遂贈詩云得道純陽亡百秋五湖四海任風流此身己出三千界一日須遊數十州醉倒清風明月夜踏翻紅蓼白蘋洲禪門衲子休相笑我在華嚴最上頭僧謝出門乘雲而去純陽帝君神化妙通紀卷之七
