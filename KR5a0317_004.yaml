front:
  text: 純陽帝君神化妙通紀卷之四帝四
  hash: sha256:3f59c110fbd2133c2c4e05b2b8dc634b9ef482f2916b7f3b81c45d4521598915
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_004-001a, image: hfl/0159/0159-074.png}
body:
  text: 玄門苗善時校正編次詩彖遊金峩寺第二十五化帝君抵四明金峨寺顧方丈蕭然頃有一童子出乃問此何寥寥童子曰莫道寥寥虛空也不著師佳其答題詩壁曰金峨有門出不鑰見箇仙童赤雙腳問伊方丈何寥寥報道虛空也不著聞此語笑欣欣主翁豈是尋常人我來謁見不得見渴心耿耿生埃塵歸去也波浩渺路入蓬萊山沓杳相思同上石樓兒雪晴海上千峰曉彖曰洞門開闔無關鑰出有入無奚動腳動靜兩忘了不拘色身三昧全無著無嗔無怒不歡欣中孚無妄與同人性天清肅無纖翳靈地虛間絶點塵無涯苦海滔滔渺有限光陰冥冥杳石樓擊碎雪初晴冷淡寂寞能幾曉二十六化二十七化二十八化二十九化三十化三十一化三十二化三十三化已上原缺道印康節第三十四化康節先生邵雍宇堯夫一日宴坐忽聞異香滿室覺心地恍然遂下數得一兊卦為口重兊兩口也曰吕公至也忙整案設一純陽真人位牌敬待良久僕報一道人在門首欲謁雍忙出作禮迎請上庭真人中坐將位案倒曰爾何知吾來雍以前因實告真人曰子既知吾來必知吾往只今吾往何處雍茫然無答再拜進酒果雍重禮求點化真人曰適來便是吾一念動子便知之吾寂然子茫然罔措雍豁然有悟再拜真人止之曰子有何見便謝雍曰一念未起鬼神莫知不由乎我更由乎誰真人曰此性理也真空慧命則未在雍再拜三熏跪曰望師點化愚頑真人曰孟子以直養浩然云難言也非難言不得其人也子平日德厚多有陰騭吾故來提子適有悟性宗一邊事吾安忍不傳子然子性雖明了奈纍未消再拜懇告再三遂授口訣拜謝再進酒洪飮抵暮飄然而往家庭異香半月不散自此後堯夫少出屛事養浩樂天後工夫綿密有詩云冬至子之半天心無改移一陽方動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問庖犧神警陳公第三十五化陳公執中建甲第東都大會親朋合樂陳嘗奉道和混有德有藍縷道士即洞賔也陳公問曰子何技能曰我有仙樂一部欲奏以侑燕席腰間出一軸畫挂于柱上繪仙女十二人各執樂器道士呼使如人纍纍列于前兩女執幢幡以導諸女奏樂皆玉肌花貌麗態嬌音冠七寶冠衣六銖衣金珂玉佩轉動珊然鼻上各有一粒黃玉如黍大而體甚輕虛終不類生人樂音清徹雲霄曲調特異三闋竟陳曰此何名女子道士曰此六甲六丁玉女人學道成則身中三魂七魄五臟六腑諸神皆而為此公亦願學否陳以為幻惑頗不快道士顧諸女可去矣遂皆復上畫軸道士取軸張口吞之索紙筆大書之曰曾經天上三千劫又在人間五百年腰下劍鋒橫紫電爐中丹焰起蒼煙才騎白鹿過滄海復跨青牛入洞天小技等間聊戲爾無人知我是神仙末題云谷客書即出俄不見陳謂谷客吕洞賔也悔恨欲抉目未幾謝世探徐神翁第三十六化海陵徐神翁得道知人休咎賔客滿門吕惠卿往謁之適有道人踞上坐不起頗以語侵惠卿惠卿怫然不平曰子何人斯道人曰吾與若同族之胄道人布香爐灰於地畫灰作一詞曰鼎裏坎離壺中天地滿懷風月一吸虛空塵寰裏何人識我開口問洪濛雲中三弄笛嶽陽樓外天遠霞紅笑騎黃鶴暫過海陵東拂袖呵呵歸去鑾和玉佩風響喬松君若要知吾蹤迹試與問仙翁拍手大笑而去不知所之惠卿問徐徐曰即洞賔也惠卿方悟同族之説追恨莫及再提惠卿第三十七化元豐中惠卿守單州天慶觀七月七日有異人過焉書二詩于紙一曰四海孤遊一野人兩壺霜雪足精神坎離二物今收得龍虎丹成運水銀一曰野人本是天台客石橋南畔有舊宅父子生來有兩口多好歌兮不好拍惠卿壻余中解之曰後篇第一句客者賔也第二句石橋者洞也第三句兩口者吕也第四句歌者吟也吟此詩者其洞賔也救滕中病第三十八化元豐中東京有道人稱谷客與布衣滕中同飲將起以藥一丸遺滕滕有癖誓願齋道求治得遇真人賜藥服之即愈别又二年於揚州開明橋東隔水相遇客坐水次招滕取路跨橋柱而往至則無所睹始悟其洞賔也怏怏佯狂未幾卒度陳宣德第三十九化宣德即陳某嘗遇帝君授以巨履神丹可疾走可不老作二詞一曰葆鍊中分相火行持外借方鞋清虛爽徹御原缺十六字靈寶為胎十方無極至真來恍惚芝軿羽蓋二曰一日清歡何往十年舊事重拈細風斜日到江南春滿平湖瀲灧黃簡手題龍篆緑輿前控鸞驂王清真籙署仙銜列職靈臺書監後宣德尸解而逝神光繪像第四十化帝君遊山陽神光觀丐筆自繪己像於三清殿北墉眉目修整狀貌古怪不類世傳上有北斗七大星君相被髮秉圭立傍作一符徑丈餘書曰元祐二年作如知吾下筆處可與語道人以疾刮符服之往往良效靈石求齋第四十一化杭州西湖南岸靈石寺一日有四道人來乞齋僧已停午齋已過拒而不接一道人題六言詩一道南塢數回泉石西峰幾疊煙雲登携孰以為侣顔偶李甲蕭耘或解之曰首句寓吕宇次句寓洞宇三句寓賔宇四句是三人姓名必吕公與三人偕也其宇倒書于椽間削之不滅景德度僧第四十二化東京景德寺峨嵋院有一蜀僧來住持號峨嵋道者戒律甚嚴至二十年不去方丈一日有異人青巾白袍道者厚待之昂然來與語至半夜而去期以明年今日後相見侍童皆見之明年次日午道者索沐坐逝至暮異人來歎息不已俄失所次日但於堂側壁間絶高處望所書字筆勢飛動如舞鳳翔鸞乃詩一章曰落日斜西風冷今夜故人來不來教人立盡梧桐影小書云同省作蓋寓洞賔二宇減畫也遊大庾嶺第四十三化橫浦大庾嶺有一富家子慕道建庵接雲水士多年一日衆建黃籙大醮方罷忽有一藍縷道人至求齋衆不知恤或以凌辱道人題一詞于壁曰暫遊橫浦白鶴飛來誰同語嶺畔人家曾見寒梅幾度花春來春去人在落花流水處花滿前蹊藏盡神仙人不知末書云無心昌老來宇作三樣筆勢題畢竟入雲堂良久不出迹之已不見徐視其宇深透壁後矣始知昌字無心乃吕公也衆共歎惋度忠獻公第四十四化韓忠獻公琦晚年喜延方士帝君鶉衣垢面求謁韓意輕之曰汝何能解曰能墨試令為之即掘地坎溲焉韓不悅帝君揉和坎中泥為墨曰成矣遂去公徐取墨視之乃良金上有吕宇破之字徹肌理韓追恨無已後再遇得點化精修三年後尸解充紫府真人訪蔣暉作第四十五化全州道士蔣暉志行高卓洞賔謁之適蔣他出帝君題詩于壁曰醉舞高歌海上山天瓢承露浴金丹夜深鶴透秋空壁萬里西風一劍寒後書無上宮主訪蔣暉作遂去宇徹壁暉歸大驚曰宫宇無上此吕翁也追之不復得矣賜藥黃覺第四十六化黃覺能詩名宦未遂一日送客東都門外至則客已去追不及旅次見一羽士因携祖席酒殽呼羽士共享之畢羽士舉杯托水書吕宇且曰明年江南見君翩然而去覺始悟其洞賔也明年果調官江南復見洞賔與大錢七其次十又其次小錢三曰數不可益也吾以藥數寸遺子歲旦以酒磨服之可一歲無患覺如其言至七十三歲藥亦垂竭作詩曰床頭曆日無多子屈指今年七十三遂終度李太醫第四十七化東京李德成能醫崇道心慈多救貧苦有陰德盛寒時遇一貧窘道士衣單衣無寒色邀李入酒肆自據主席李怪之店者曰交錢取酒道士指店中三酒瓶曰中各有一升酒錢店者始不信試視之果然乃以三升酒與之道士酌後飮李止取一瓶二瓶自竭語李曰此小術耳吾乃吕洞賔也李驚喜道士書一絶曰九重天子寰中貴五等諸侯間外尊爭似布衣無事客不將性命屬乾坤李不悟秪以藥一粒遺李曰服此當享高壽即别去李服藥髮不白齒不落百七歲而卒尼寺留題第四十八化東京安遠門內有一尼寺祖師在彼欲度某人緣淺不來向東門之東壁作一詩題其上墨透三寸餘筆力遒徑詩曰青龍駐此少徘徊夜靜雲間尚未來知是有緣人换骨暫留真迹到天台徊宇止書其半意在為洞賔也賜藥馬氏第四十九化東京一歲民大病瘧帝君普化皆拒之有老姥馬氏鬻荼子孫皆病一日有道人來老姥善待之以子孫病為請道人曰竪旦待我姥早起待道人以絳紗裹藥病發者執之自愈一圓可愈百人遇百人即不驗矣姥從之子孫皆愈遍療及百人滿果不驗姥拆囊已不見藥但有吕洞賔三字而已救孝子母第五十化桐廬有通守沈志真有母病發背百方不瘥祈禱備至孝忱所感帝君夜往救之曰公至孝感天命豫來救拔若遲一日不復可療乃授以靈寶膏方括蔞五枚取好乳香五塊如棗大二味各細研以白砂蜜一斤同煎成膏每服三錢溫酒化下大治發背諸惡瘡腫漏其母服之立痊通守繪洞賔像朝夕敬事焉純陽帝君神化妙通紀卷之四
