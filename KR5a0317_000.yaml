front:
  text: 純陽帝君神化妙通紀序帝一
  hash: sha256:7d984f8fc4461caabd328d0f4d4437688862f11d724d35ebde06b599cfdd7c17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0317_HFL_000-001a, image: hfl/0159/0159-004.png}
body:
  text: 吾道或以神通誘掖塵俗或以藥物救濟善良委順曲成隨機方便大慈大化會萬派咸歸一源至願至仁備衆德不居一德悟不空之未始了無生之有玄論其微言辭難盡悟其的擬議即遙不可智識以度思當在精誠而默會僕不揣井觀管量於諸經集唐宋史傳托收實迹削去浮華績成一百二十化析為六卷每章就和詩詞彖章直説曰之神化妙通紀使同心志士開卷朗然得觀天象默會道微明通無極重玄了徹純陽至妙圓通無上道真得先天春不肖誠意集成高明公心靜鑑自然不迷異徑直造天衢矣金陵中和老呆子苗善時敬序引制詞皇帝若曰大道開名可致無為之化至真在宥迄成不宰之功朕以祖宗獲成基構若稽昭代雅慕玄風自東華垂教之餘至重陽開化之始真真不昧代代相承有感遂通無遠弗屆雖前代纍承褒贈在朕心猶慊追崇特乃命儒臣進加徽號惟東華以稱帝君增紫府少陽之宇其正陽純陽海蟾宜錫真君名丹陽以下七真俱號真人載在方册傳之萬世噫漢世之張道陵唐朝之葉法善俱錫天師之號永為道紀之榮當代不聞異辭後來立為定制朕之所慕或庶幾焉東華教主可贈東華紫府少陽帝君正陽鍾離真人可贈正陽開悟傳道真君純陽吕真人可贈純陽演正警化真君海蟾劉真人可贈海蟾明悟弘道真君重陽王真人可贈重陽全真開化真君宜令掌教光先體道誠明真人張志敬執行準此至元六年正月日上天眷命皇帝聖旨昔聞太上教闡全真法天地之常經因陰陽之大順始東華之變現訖于開化之垂緣由漢及唐必曠代而至人出以金繼宋際熙朝而玄統彰恢其衆妙之門鎮以無名之朴或得意忘象涵泳於靈樞或驂星御龍飛遊於紫極不可聞不可見惟與造物者為徒翛然往翛然來亦曰隨時而示應今載傳於後裔猗叶贊於元功盍殊級之循加俾宗風之永紹除始祖東華帝君别議旌崇餘仰主者一例施行正陽開悟傳道鍾離真君可加贈正陽開悟傳道垂教帝君純陽演正警化吕真君可加贈純玉演正警化孚佑帝君海蟾明悟弘道劉真君可加贈海蟾明悟弘道純佑帝君重陽全真開化王真君可加贈重陽全真開化輔極帝君右付玄門演道大宗師掌教凝和持正明素真人苗道一收執準此至大三年二月日
